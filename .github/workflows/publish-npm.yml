name: Publish npm Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. 0.1.0"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # GitHub-hosted: provenance requires it, free for public repos.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify requested version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
            echo "Requested ${{ inputs.version }} != package.json $PACKAGE_VERSION"
            exit 1
          fi
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
