{{- if and .Values.web.enabled (not .Values.web.secrets.existingSecret) -}}
{{- $isOidc := eq .Values.web.authProvider "oidc" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitmarket.webSecretName" . }}
  labels:
    {{- include "agentkitmarket.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
type: Opaque
data:
  {{- /*
  Admin → backend key (always needed for admin/submit server routes). Reuses the
  backend's effective admin key when web.secrets.adminApiKey is unset, so a
  self-hoster configures ONE key. Must match backend ADMIN_API_KEY.
  */}}
  AGENTKITMARKET_ADMIN_KEY: {{ include "agentkitmarket.effectiveWebAdminApiKey" . | b64enc | quote }}
  {{- with .Values.web.secrets.profileServiceKey }}
  PROFILE_SERVICE_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- if $isOidc }}
  {{- /*
  OIDC (self-host). The client secret is required for the authorization-code
  flow; SESSION_SECRET signs the iron-session cookie and is auto-generated +
  persisted when not supplied. Public browsing works without these — they only
  gate sign-in / admin / submit.
  */}}
  {{- with .Values.web.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ . | b64enc | quote }}
  {{- end }}
  SESSION_SECRET: {{ include "agentkitmarket.effectiveSessionSecret" . | b64enc | quote }}
  {{- else }}
  {{- /*
  WorkOS (hosted default). Emitted only when set so the chart renders cleanly
  before a self-hoster has wired up WorkOS (public catalog still works).
  */}}
  {{- with .Values.web.secrets.workosApiKey }}
  WORKOS_API_KEY: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosClientId }}
  WORKOS_CLIENT_ID: {{ . | b64enc | quote }}
  {{- end }}
  {{- with .Values.web.secrets.workosCookiePassword }}
  WORKOS_COOKIE_PASSWORD: {{ . | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
