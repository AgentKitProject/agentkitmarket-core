apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitmarket.secretName" . }}
  labels:
    {{- include "agentkitmarket.labels" . | nindent 4 }}
type: Opaque
data:
  ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | b64enc | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  S3_ENDPOINT: {{ .Values.secrets.s3Endpoint | b64enc | quote }}
  PACKAGE_BUCKET_NAME: {{ .Values.secrets.packageBucketName | b64enc | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.secrets.s3AccessKeyId | b64enc | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.s3SecretAccessKey | b64enc | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | b64enc | quote }}
