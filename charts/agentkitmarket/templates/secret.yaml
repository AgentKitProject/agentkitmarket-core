{{- if not .Values.secrets.existingSecret -}}
{{- /*
Connection strings default to the in-cluster bundled services when the matching
secrets.* override is empty AND that bundled service is enabled. Set the
secrets.* value (and disable the bundle) to point at an external instance.
*/ -}}
{{- $fullname := include "agentkitmarket.fullname" . -}}
{{- $pgPassword := include "agentkitmarket.effectivePostgresPassword" . -}}
{{- $minioPassword := include "agentkitmarket.effectiveMinioPassword" . -}}
{{- $db := .Values.secrets.databaseUrl -}}
{{- if and (not $db) .Values.postgres.enabled -}}
  {{- $db = printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.user $pgPassword $fullname .Values.postgres.database -}}
{{- end -}}
{{- $s3Endpoint := .Values.secrets.s3Endpoint -}}
{{- $s3PublicEndpoint := .Values.secrets.s3PublicEndpoint -}}
{{- $bucket := .Values.secrets.packageBucketName -}}
{{- $s3Key := .Values.secrets.s3AccessKeyId -}}
{{- $s3Secret := .Values.secrets.s3SecretAccessKey -}}
{{- if .Values.minio.enabled -}}
  {{- if not $s3Endpoint }}{{- $s3Endpoint = printf "http://%s-minio:9000" $fullname -}}{{- end -}}
  {{- if not $bucket }}{{- $bucket = .Values.minio.bucket -}}{{- end -}}
  {{- if not $s3Key }}{{- $s3Key = .Values.minio.rootUser -}}{{- end -}}
  {{- if not $s3Secret }}{{- $s3Secret = $minioPassword -}}{{- end -}}
{{- end -}}
{{- $redis := .Values.secrets.redisUrl -}}
{{- if and (not $redis) .Values.redis.enabled -}}
  {{- $redis = printf "redis://%s-redis:6379" $fullname -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentkitmarket.secretName" . }}
  labels:
    {{- include "agentkitmarket.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.secrets.adminApiKeyExistingSecret }}
  ADMIN_API_KEY: {{ include "agentkitmarket.effectiveAdminApiKey" . | b64enc | quote }}
  {{- end }}
  DATABASE_URL: {{ $db | b64enc | quote }}
  S3_ENDPOINT: {{ $s3Endpoint | b64enc | quote }}
  {{- if $s3PublicEndpoint }}
  S3_PUBLIC_ENDPOINT: {{ $s3PublicEndpoint | b64enc | quote }}
  {{- end }}
  PACKAGE_BUCKET_NAME: {{ $bucket | b64enc | quote }}
  S3_ACCESS_KEY_ID: {{ $s3Key | b64enc | quote }}
  S3_SECRET_ACCESS_KEY: {{ $s3Secret | b64enc | quote }}
  REDIS_URL: {{ $redis | b64enc | quote }}
  {{- /* Persist generated bundled-service passwords so cross-template renders
         and helm upgrades stay consistent (read back via lookup). */}}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  MINIO_ROOT_PASSWORD: {{ $minioPassword | b64enc | quote }}
  {{- end }}
{{- end -}}
