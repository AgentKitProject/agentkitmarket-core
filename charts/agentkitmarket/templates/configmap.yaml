apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentkitmarket.configmapName" . }}
  labels:
    {{- include "agentkitmarket.labels" . | nindent 4 }}
data:
  API_ALLOWED_ORIGINS: {{ .Values.config.allowedOrigins | quote }}
  S3_REGION: {{ .Values.config.s3Region | quote }}
  S3_FORCE_PATH_STYLE: {{ .Values.config.s3ForcePathStyle | quote }}
  PORT: {{ .Values.config.port | quote }}
  {{- if .Values.postgres.enabled }}
  # Override DATABASE_URL to point at the in-cluster Postgres.
  # (The Secret takes precedence — this provides a discoverable default.)
  _POSTGRES_HOST: {{ include "agentkitmarket.fullname" . }}-postgres
  {{- end }}
  {{- if .Values.minio.enabled }}
  _MINIO_ENDPOINT: http://{{ include "agentkitmarket.fullname" . }}-minio:9000
  PACKAGE_BUCKET_NAME_DEFAULT: {{ .Values.minio.bucket | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  _REDIS_HOST: {{ include "agentkitmarket.fullname" . }}-redis
  {{- end }}
